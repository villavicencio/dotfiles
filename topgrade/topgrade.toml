[misc]
# Assume "yes" to all prompts
assume_yes = true
# Don't ask to retry failed steps
no_retry = true
# Cleanup after updating
cleanup = true
# Skip JetBrains IDEs (not installed) and system RubyGems (managed through RVM)
disable = [
  "jetbrains_aqua",
  "jetbrains_clion",
  "jetbrains_datagrip",
  "jetbrains_dataspell",
  "jetbrains_gateway",
  "jetbrains_goland",
  "jetbrains_idea",
  "jetbrains_mps",
  "jetbrains_phpstorm",
  "jetbrains_pycharm",
  "jetbrains_rider",
  "jetbrains_rubymine",
  "jetbrains_rustrover",
  "jetbrains_toolbox",
  "jetbrains_webstorm",
  "gem",
]
