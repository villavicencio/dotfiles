[misc]
# Assume "yes" to all prompts
assume_yes = true
# Don't ask to retry failed steps
no_retry = true
# Cleanup after updating
cleanup = true
# Skip JetBrains IDEs (not installed) and system RubyGems (managed through RVM).
# Skip pnpm: ~/package.json pins `packageManager: yarn@...`, so pnpm correctly
# refuses to run there — yarn step handles the actual updates.
# Skip containers: Docker Desktop is installed via Brewfile but the daemon is
# only run on demand; topgrade's image-update step requires it to be running.
# Skip colima: same on-demand rationale — the runtime-update step needs the VM
# running (fails `colima is not running` when it's down). The colima binary
# still updates via Brew; only the in-VM runtime step is skipped.
# Skip microsoft_office: not used; msupdate fires `XPC Connection invalidated`
# every run when no Office app is foregrounded — pure noise.
disable = [
  "jetbrains_aqua",
  "jetbrains_clion",
  "jetbrains_datagrip",
  "jetbrains_dataspell",
  "jetbrains_gateway",
  "jetbrains_goland",
  "jetbrains_idea",
  "jetbrains_mps",
  "jetbrains_phpstorm",
  "jetbrains_pycharm",
  "jetbrains_rider",
  "jetbrains_rubymine",
  "jetbrains_rustrover",
  "jetbrains_toolbox",
  "jetbrains_webstorm",
  "gem",
  "ruby_gems",
  "pnpm",
  "containers",
  "colima",
  "microsoft_office",
]

# Custom commands appended to the topgrade run.
# `command -v` guard makes each command a no-op on hosts where the binary is
# absent, so the same config works on macOS + the VPS without per-host forks.
# `yes y |` feeds the post-dry-run "Continue? [y/n]:" prompt — mac-cleanup-py's
# --force accepts warnings but does NOT skip that final confirmation, and
# topgrade runs non-interactively so a hanging stdin would block the whole run.
# Config for which modules to run is stored in ~/.config/mac_cleanup_py/config.toml
# after the first interactive `mac-cleanup` invocation and reused here.
# Keep `dns_cache` OFF in that config — it shells out to `sudo dscacheutil` /
# `sudo killall mDNSResponder`, and mac-cleanup's progress bar swallows sudo's
# password prompt. Interactively this hangs forever (caught 2026-05-08, after a
# 16h stall); under topgrade's no-TTY environment sudo errors out fast and the
# `|| true` keeps the run going, but the cleanup silently aborts mid-list and
# leaves later modules unrun. DNS cache flush is cosmetic anyway — Wi-Fi cycle
# or reboot does the same thing.
[commands]
"Clean macOS caches (mac-cleanup-py)" = "command -v mac-cleanup >/dev/null 2>&1 && yes y | mac-cleanup --force || true"
