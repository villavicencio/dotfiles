name: Publish CI image

run-name: "Publish ci/Dockerfile to ghcr.io (${{ github.event_name }})"

# Builds ci/Dockerfile and publishes it to
# ghcr.io/<owner>/dotfiles-ci-ubuntu:24.04 so install-matrix.yml (the
# consuming CI workflow) can pull a pinned Ubuntu 24.04 image that
# mirrors the VPS production target.
#
# Visibility: the workflow flips the package to public on every run via
# `gh api -X PATCH .../visibility -f visibility=public` (idempotent).
# First publish creates the package as private; the visibility step
# makes it public before consumers need to pull anonymously.
#
# Supply-chain: the consuming workflow pins this image to its SHA256
# digest, not the :24.04 tag. The digest is emitted as a job output AND
# in the run summary so consumers can capture it programmatically (via
# `gh run view --json outputs -q '.outputs.digest'`) or via copy-paste.

on:
  push:
    branches: [master]
    paths:
      - 'ci/Dockerfile'
      - '.github/workflows/publish-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Latest-wins semantics for an image publisher: a newer commit
# supersedes any in-flight build. Layer pushes that don't get a
# manifest write become orphan blobs that GHCR garbage-collects.
concurrency:
  group: publish-ci-image
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ghcr.io/${{ steps.owner.outputs.lc }}/dotfiles-ci-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: owner
        run: |
          # ghcr.io rejects uppercase refs. Lowercase the owner so
          # uppercase-login forks (and future owner-renames) push cleanly.
          echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./ci
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.lc }}/dotfiles-ci-ubuntu:24.04
          # provenance: false — SLSA attestation produces a manifest list
          # that complicates digest pinning. Revisit if the digest-pin
          # contract is ever replaced by attestation verification.
          provenance: false

      - name: Validate digest before emitting
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::build-push-action did not emit a digest. Image push likely failed."
            exit 1
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::digest does not look like sha256:<64-hex>: $DIGEST"
            exit 1
          fi

      - name: Ensure package is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent visibility flip — set public so consumers can pull
          # anonymously. Best-effort: if the token lacks admin:packages or
          # the package endpoint hasn't propagated yet, emit a warning.
          # The next run retries.
          #
          # Path is /user/... for user-owned packages.
          # For org-owned (post-transfer): /orgs/<owner>/packages/...
          if gh api -X PATCH \
            "/user/packages/container/dotfiles-ci-ubuntu/visibility" \
            -f visibility=public 2>/dev/null; then
            echo "Package visibility: public (user-owned path)"
          else
            echo "::warning::visibility flip via /user/ failed. If this repo is org-owned, the path is /orgs/${{ steps.owner.outputs.lc }}/packages/container/dotfiles-ci-ubuntu/visibility — flip manually via the Packages UI on first run."
          fi

      - name: Publish digest in run summary
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          OWNER="${{ steps.owner.outputs.lc }}"
          IMAGE="ghcr.io/${OWNER}/dotfiles-ci-ubuntu"
          {
            echo "## Published CI image"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${IMAGE}:24.04\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo ""
            echo "### Pin in the consuming workflow"
            echo ""
            echo '```yaml'
            echo "container:"
            echo "  image: ${IMAGE}@${DIGEST}"
            echo '```'
            echo ""
            echo "Programmatic capture:"
            echo '```'
            echo "gh run view ${{ github.run_id }} --json jobs -q '.jobs[].outputs.digest'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
