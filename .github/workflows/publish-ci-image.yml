name: Publish CI image

run-name: "Publish ci/Dockerfile to ghcr.io (${{ github.event_name }})"

# Builds ci/Dockerfile and publishes it to
# ghcr.io/<owner>/dotfiles-ci-ubuntu:24.04 so install-matrix.yml (the
# consuming CI workflow) can pull a pinned Ubuntu 24.04 image that
# mirrors the VPS production target.
#
# Visibility: the workflow flips the package to public on every run via
# `gh api -X PATCH .../visibility -f visibility=public` (idempotent).
# First publish creates the package as private; the visibility step
# makes it public before consumers need to pull anonymously.
#
# Supply-chain: the consuming workflow pins this image to its SHA256
# digest, not the :24.04 tag. The digest is emitted as a job output AND
# in the run summary so consumers can capture it programmatically (via
# `gh run view --json outputs -q '.outputs.digest'`) or via copy-paste.

on:
  push:
    branches: [master]
    paths:
      - 'ci/Dockerfile'
      - '.github/workflows/publish-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Latest-wins semantics for an image publisher: a newer commit
# supersedes any in-flight build. Layer pushes that don't get a
# manifest write become orphan blobs that GHCR garbage-collects.
concurrency:
  group: publish-ci-image
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ghcr.io/${{ steps.owner.outputs.lc }}/dotfiles-ci-ubuntu
    steps:
      - name: Checkout
        # Third-party actions are SHA-pinned to close the supply-chain
        # vector where a force-pushed mutable tag could compromise this
        # workflow's secrets.GITHUB_TOKEN (packages: write). Version
        # comments preserve the human-readable pin.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Lowercase repository owner
        id: owner
        run: |
          # ghcr.io rejects uppercase refs. Lowercase the owner so
          # uppercase-login forks (and future owner-renames) push cleanly.
          echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ./ci
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.lc }}/dotfiles-ci-ubuntu:24.04
          # provenance: false — SLSA attestation produces a manifest list
          # that complicates digest pinning. Revisit if the digest-pin
          # contract is ever replaced by attestation verification.
          provenance: false

      - name: Validate digest before emitting
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::build-push-action did not emit a digest. Image push likely failed."
            exit 1
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::digest does not look like sha256:<64-hex>: $DIGEST"
            exit 1
          fi

      - name: Smoke-test image contents
        # Pulls the just-pushed image by digest and runs each tool the install
        # pipeline assumes is present in the base layer. A silent apt failure
        # during build that Docker layer-caches past would otherwise produce a
        # valid-shape digest pointing at a broken image; install-matrix.yml
        # would only catch the regression after a consuming-side digest pin
        # bump, by which time the broken artifact is already canonical on
        # GHCR. Hard-failing here keeps the visibility flip below from
        # promoting a broken image to public.
        run: |
          IMAGE="ghcr.io/${{ steps.owner.outputs.lc }}/dotfiles-ci-ubuntu@${{ steps.build.outputs.digest }}"
          # `import json` covers the Dotbot trampoline (bin/dotbot exec's
          # python3 with stdlib imports). `import yaml` is intentionally NOT
          # tested here even though #63's spec listed it — Dotbot bundles its
          # own PyYAML at lib/pyyaml/lib and inserts it into sys.path at
          # runtime, so the image does not need a system-installed PyYAML.
          # The Dockerfile uses --no-install-recommends and would have to add
          # python3-yaml just for this assertion to pass; that would bloat the
          # image for no real coverage gain.
          docker run --rm "$IMAGE" python3 -c 'import json'        # Dotbot trampoline + stdlib
          docker run --rm "$IMAGE" sh -c 'command -v sudo'         # install_packages.sh trampoline
          docker run --rm "$IMAGE" sh -c 'command -v zsh'          # R4 assertion target
          docker run --rm "$IMAGE" sh -c 'command -v git'          # checkout + dotbot submodules
          # ForceIPv4 conf must stay first in the RUN chain (see comment in
          # ci/Dockerfile). If a cleanup commit silently strips it, the apt
          # IPv6 SYN-timeout regression on archive.ubuntu.com re-emerges and
          # Linux CI goes from ~63s back toward ~12 minutes. Catching the
          # strip at publish time stops the broken image from getting pinned
          # downstream.
          #
          # Assert the EFFECTIVE value via `apt-config dump` (which parses the
          # full conf.d tree and emits one canonical line), not raw substring
          # presence — a future change to "false", a commented-out directive,
          # or a same-line comment would all pass a naive grep on the conf
          # file but defeat the invariant.
          actual="$(docker run --rm "$IMAGE" apt-config dump Acquire::ForceIPv4)"
          expected='Acquire::ForceIPv4 "true";'
          if [ "$actual" != "$expected" ]; then
            echo "::error::ForceIPv4 invariant broken. apt-config dump returned: ${actual:-<empty>}"
            exit 1
          fi

      - name: Ensure package is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent visibility flip — set public so consumers can pull
          # anonymously. Best-effort: if the token lacks admin:packages or
          # the package endpoint hasn't propagated yet, emit a warning.
          # The next run retries.
          #
          # Path is /user/... for user-owned packages.
          # For org-owned (post-transfer): /orgs/<owner>/packages/...
          if gh api -X PATCH \
            "/user/packages/container/dotfiles-ci-ubuntu/visibility" \
            -f visibility=public 2>/dev/null; then
            echo "Package visibility: public (user-owned path)"
          else
            echo "::warning::visibility flip via /user/ failed. If this repo is org-owned, the path is /orgs/${{ steps.owner.outputs.lc }}/packages/container/dotfiles-ci-ubuntu/visibility — flip manually via the Packages UI on first run."
          fi

      - name: Publish digest in run summary
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          OWNER="${{ steps.owner.outputs.lc }}"
          IMAGE="ghcr.io/${OWNER}/dotfiles-ci-ubuntu"
          {
            echo "## Published CI image"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${IMAGE}:24.04\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo ""
            echo "### Pin in the consuming workflow"
            echo ""
            echo '```yaml'
            echo "container:"
            echo "  image: ${IMAGE}@${DIGEST}"
            echo '```'
            echo ""
            echo "Programmatic capture:"
            echo '```'
            echo "gh run view ${{ github.run_id }} --json jobs -q '.jobs[].outputs.digest'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
