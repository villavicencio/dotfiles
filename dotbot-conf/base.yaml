# Shared install layer — directives common to macOS and Linux.
#
# The `install` wrapper runs THIS first, then the platform layer
# (dotbot-conf/darwin.yaml or dotbot-conf/linux.yaml). Keep platform-specific
# directives out of here; the one exception is the Linux locale step below,
# which must run before install_packages.sh and so can't wait for the platform
# layer (it is uname-guarded to a no-op on macOS).
#
# Directive order matters: ~/.zshenv is written + linked + sourced before the
# helper scripts run, and the ~/.config/nvim link is created before
# install_nvim.sh bootstraps its plugins.

- defaults:
    link:
      relink: true
    shell:
      quiet: true
      stdout: true
      stderr: true

# force:false (default) → removes only DEAD dotfiles symlinks; live links from
# the platform layer are left intact, so running clean once here is safe.
- clean: ["~"]

- create:
    - ~/.hushlogin
    - ~/.config
    - ~/.config/zsh
    - ~/.config/btop
    - ~/.config/git
    - ~/.config/lazygit
    - ~/.config/tmux
    - ~/.config/tmux/resurrect
    - ~/.config/tmux/plugins
    - ~/.config/tmux/scripts
    - ~/.local/bin

- shell:
    - command: |
        if [ "${DOTFILES_DRY_RUN:-0}" = "1" ]; then
          echo "[dry-run] would clobber ~/.zshenv with ZDOTDIR export"
        else
          echo "export ZDOTDIR=$HOME/.config/zsh" > ~/.zshenv
        fi
      description: Setting ZDOTDIR in .zshenv
      quiet: true
    - command: |
        if [ "${DOTFILES_DRY_RUN:-0}" = "1" ]; then
          echo "[dry-run] would append '. \$HOME/.config/zsh/.zshenv' to ~/.zshenv"
        else
          echo ". \"$HOME/.config/zsh\"/.zshenv" >> ~/.zshenv
        fi
      description: Adding dot command for more extensive zshenv in .zshenv
      quiet: true
    - command: |
        if [ "$(uname)" = "Darwin" ]; then
          :  # locale generation is Linux-only; no-op on macOS
        elif [ "${DOTFILES_DRY_RUN:-0}" = "1" ]; then
          echo "[dry-run] would apt-get update + install locales + locale-gen en_US.UTF-8 + update-locale"
        else
          # Must run before install_packages.sh. apt-get update is required
          # because the ci/Dockerfile minimal base strips /var/lib/apt/lists/*;
          # DEBIAN_FRONTEND=noninteractive is passed THROUGH sudo (env_reset
          # strips it otherwise) so the `locales` postinst doesn't hang on a
          # debconf menu on a non-tty runner.
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y locales
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8 LANGUAGE=en_US:en LC_ALL=en_US.UTF-8
        fi
      description: "Generating en_US.UTF-8 locale (Linux only)"
    - command: bash helpers/install_omz.sh
      description: "Installing omz + plugins"
      quiet: true

- link:
    ~/.config/zsh/.zshenv: zsh/zshenv
    ~/.config/zsh/.zshrc: zsh/zshrc
    ~/.gitconfig: git/gitconfig
    ~/.config/git/gitignore: git/gitignore
    ~/.config/git/gitattributes: git/gitattributes
    ~/.config/btop/btop.conf: btop/btop.conf
    ~/.config/lazygit/config.yml: lazygit/config.yml
    ~/.config/tmux/tmux.conf: tmux/tmux.conf
    ~/.config/tmux/tmux.general.conf: tmux/tmux.general.conf
    ~/.config/tmux/tmux.display.conf: tmux/tmux.display.conf
    ~/.config/topgrade.toml: topgrade/topgrade.toml
    ~/.local/bin/dot: bin/dot
    # Whole-directory link: the tracked NvChad v2.5 config IS ~/.config/nvim.
    # Created here (before the shell block below runs install_nvim.sh) so the
    # headless plugin bootstrap has a config to load. The `if` skips (not fails)
    # the link while ~/.config/nvim is still a real directory (pre-migration on
    # an existing machine); Dotbot won't clobber a real dir without force.
    ~/.config/nvim:
      path: nvim
      if: '[ ! -e "$HOME/.config/nvim" ] || [ -L "$HOME/.config/nvim" ]'

- shell:
    - command: |
        if [ "${DOTFILES_DRY_RUN:-0}" = "1" ]; then
          echo "[dry-run] would source ~/.zshenv"
        elif [ -f ~/.zshenv ]; then
          . ~/.zshenv
        else
          echo "WARN: ~/.zshenv missing, skipping source" >&2
        fi
      description: "Source ~/.zshenv"
      quiet: true
    - [git submodule update --init --recursive, "Installing submodules"]
    - [bash helpers/install_packages.sh, "Installing packages"]
    - [bash helpers/install_tmux.sh, "Installing tmux + plugins"]
    - [bash helpers/install_nvim.sh, "Installing nvim + plugins"]
    - [bash helpers/install_pre_commit.sh, "Installing pre-commit + gitleaks hook"]

- link:
    ~/.config/tmux/scripts/save-window-meta.sh: tmux/scripts/save-window-meta.sh
    ~/.config/tmux/scripts/restore-window-meta.sh: tmux/scripts/restore-window-meta.sh
    ~/.config/tmux/scripts/location.sh: tmux/scripts/location.sh
