- defaults:
    link:
      relink: true
    shell:
      quiet: true
      stdout: true
      stderr: true

- clean: ["~"]

- create:
    - ~/.hushlogin
    - ~/.config
    - ~/.config/zsh
    - ~/.config/btop
    - ~/.config/git
    - ~/.config/lazygit
    - ~/.config/tmux
    - ~/.config/tmux/resurrect
    - ~/.config/tmux/plugins
    - ~/.config/tmux/scripts
    - ~/.local/bin
    - ~/.local/share/fonts

- shell:
    - command: 'echo "export ZDOTDIR=$HOME/.config/zsh" > ~/.zshenv'
      description: Setting ZDOTDIR in .zshenv
      quiet: true
    - command: |
        if [ "$(uname)" != "Darwin" ]; then
          sudo apt-get install -y locales
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8 LANGUAGE=en_US:en LC_ALL=en_US.UTF-8
        fi
      description: "Generating en_US.UTF-8 locale (non-macOS systems only)"
    - command: 'echo ". \"$HOME/.config/zsh\"/.zshenv" >> ~/.zshenv'
      description: Adding dot command for more extensive zshenv in .zshenv
      quiet: true
    - command: bash helpers/install_omz.sh
      description: "Installing omz + plugins"
      quiet: true
    # chsh is CI-gated: PAM auth fails on hosted GitHub Actions macOS
    # runners and would break .github/workflows/install-matrix.yml's
    # exit-zero assertion. Skipping in CI is safe — the chsh path is
    # exercised on real machines via the install runbook. Block style
    # is intentional: the inline `[cmd, desc]` flow form trips YAML's
    # `&` anchor parser on the `&&` here.
    - command: |
        if [ "${CI:-false}" != "true" ]; then
          chsh -s $(which zsh)
        else
          echo "skipping chsh in CI"
        fi
      description: Making zsh the default shell (skipped in CI)

- link:
    ~/.config/zsh/.zshenv: zsh/zshenv
    ~/.config/zsh/.zshrc: zsh/zshrc
    ~/.gitconfig: git/gitconfig
    ~/.config/git/gitignore: git/gitignore
    ~/.config/git/gitattributes: git/gitattributes
    ~/.config/btop/btop.conf: btop/btop.conf
    ~/.config/lazygit/config.yml: lazygit/config.yml
    ~/.config/tmux/tmux.conf: tmux/tmux.conf
    ~/.config/tmux/tmux.general.conf: tmux/tmux.general.conf
    ~/.config/tmux/tmux.display.conf: tmux/tmux.display.conf
    ~/.config/topgrade.toml: topgrade/topgrade.toml
    ~/.local/bin/dot: bin/dot
    # Whole-directory link: the tracked NvChad v2.5 config IS ~/.config/nvim.
    # Placed in THIS (first) link block so the symlink exists BEFORE the shell
    # block below runs install_nvim.sh — otherwise the headless plugin bootstrap
    # would run against a missing config and no-op. The `if` skips (not fails) the
    # link while ~/.config/nvim is still a real directory (pre-migration on an
    # existing machine), since Dotbot won't clobber a real dir without force;
    # remove/back-up that dir once to let the symlink take over. :Lazy update
    # writes lazy-lock.json back through the symlink into the repo.
    ~/.config/nvim:
      path: nvim
      if: '[ ! -e "$HOME/.config/nvim" ] || [ -L "$HOME/.config/nvim" ]'

- shell:
    - . ~/.zshenv
    - [git submodule update --init --recursive, "Installing submodules"]
    - [bash helpers/install_packages.sh, "Installing packages"]
    - [bash helpers/install_tmux.sh, "Installing tmux + plugins"]
    - [bash helpers/install_nvim.sh, "Installing nvim + plugins"]
    - [bash helpers/install_fonts.sh, "Installing fonts"]
    - [bash helpers/install_nvm.sh, "Installing nvm"]
    - [bash helpers/install_node.sh, "Installing node + modules"]
    - [bash helpers/install_claude_code.sh, "Installing Claude Code (native installer)"]
    - [bash helpers/install_pre_commit.sh, "Installing pre-commit + gitleaks hook"]

- create:
    - ~/.claude/hooks
    - ~/.claude/skills

- link:
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/statusline-command.sh: claude/statusline-command.sh
    ~/.claude/hooks/tmux-attention.sh: claude/hooks/tmux-attention.sh
    ~/.config/tmux/scripts/save-window-meta.sh: tmux/scripts/save-window-meta.sh
    ~/.config/tmux/scripts/restore-window-meta.sh: tmux/scripts/restore-window-meta.sh
    ~/.config/tmux/scripts/location.sh: tmux/scripts/location.sh

- shell:
    - command: |
        echo "Installation complete! To change your default shell to zsh, please run the following command:"
        echo "chsh -s $(which zsh)"
        echo "Then log out and log back in for the changes to take effect."
      quiet: false
