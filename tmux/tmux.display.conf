# Start windows numbering at 1
set -g base-index 1

# Make pane numbering consistent with windows
setw -g pane-base-index 1

# Rename window to reflect current program
setw -g automatic-rename on

# Renumber windows when a window is closed
set -g renumber-windows on

# Set terminal title
set -g set-titles on

# Slightly longer pane indicators display time
set -g display-panes-time 800

# Slightly longer status messages display time
set -g display-time 1000

# Redraw status line every 10 seconds
set -g status-interval 1

# Clear both screen and history
bind -n C-l send-keys C-l

# Activity
set -g monitor-activity on
set -g visual-activity off

# ── Status bar (One Dark theme, matched to iTerm2) ─────────────
# bg=default lets the bar inherit the pane/terminal background, which
# makes the theme uniform with panes (window-style below) and lets the
# inner VPS tmux fuse into the outer Mac tmux chrome when nested.
# The inline pills in status-left (PREFIX/COPY/SYNC/session) keep their
# explicit backgrounds so they still pop against the transparent bar.
set -g status-style "bg=default,fg=#ABB2BF"

# Mode-aware status left:
#   Normal  → subtle session name (LOCAL blue, VPS sage green for visual distinction)
#   Prefix  → blue highlight
#   Copy    → yellow highlight
#   Sync    → red highlight
# Hex colors inside a #{?...} ternary MUST use ## (e.g. ##FFFFFF) rather than a
# bare # (#FFFFFF). Letters F, D, S, H, etc. are single-char format escapes
# (#F = window flags, #D = pane id, #S = session name, …), and when a ternary
# branch contains a bare hex color like #FFFFFF the parser consumes the leading
# #F and mangles the color to "*FFFFF". Escaping as ##FFFFFF emits a literal #
# after one expansion pass, which the style engine then reads as a hex color.
set -g status-left "\
#{?client_prefix,#[fg=#7DACD3#,bg=default]#[bg=#7DACD3#,fg=#031B21#,bold] PREFIX #[fg=#7DACD3#,bg=default],\
#{?pane_in_mode,#[fg=#E5C07B#,bg=default]#[bg=#E5C07B#,fg=#031B21#,bold] COPY #[fg=#E5C07B#,bg=default],\
#{?pane_synchronized,#[fg=#C98389#,bg=default]#[bg=#C98389#,fg=#031B21#,bold] SYNC #[fg=#C98389#,bg=default],\
#[fg=#{?#{==:#S,vps},##33843A,##2563EB}#,bg=default]#[bg=#{?#{==:#S,vps},##33843A,##2563EB}#,fg=#FFFFFF#,bold] #{?#{==:#S,vps},,}  #{?#{==:#S,local},LOCAL,#{?#{==:#S,vps},VPS,#S}} #[fg=#{?#{==:#S,vps},##33843A,##2563EB}#,bg=default] }}}\
#[bg=default] "

# Continuum's save script is inlined here instead of relying on TPM to inject
# it — TPM prepends to status-right, but config reloads overwrite that, silently
# killing auto-saves. Produces no visible output; just triggers a save check.
#
# Time + date render as one rounded pill, mirroring the LOCAL session pill's
# blue (#2563EB bg, white bold fg). The middle dot · joins time and date into
# a single visual unit so they read as "host clock" instead of two fields.
#
# Time uses 12-hour format with AM/PM (%-I:%M %p). Rounded ends use
# Powerline Extra Symbols (Nerd Fonts):
#    U+E0B6  left half-circle (filled)
#    U+E0B4  right half-circle (filled)
# Each cap glyph is rendered with fg = pill bg color and bg = bar default,
# so the glyph silhouette IS the pill's rounded end. Requires a Nerd Font
# (installed via helpers/install_fonts.sh).
set -g status-right "\
#($XDG_CONFIG_HOME/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)\
#[fg=#{?#{==:#S,vps},##33843A,##2563EB}#,bg=default]#[fg=#FFFFFF,bg=#{?#{==:#S,vps},##33843A,##2563EB}#,bold] %-I:%M %p · %b %d #[fg=#{?#{==:#S,vps},##33843A,##2563EB}#,bg=default]"

set -g status-left-length 40
set -g status-right-length 40

# Window tabs
# Window tab rendering priority (left glyph → title text):
#   1. @claude_status=asking  -> bright yellow question-mark; written by
#                                the hook for every PermissionRequest
#                                (Bash tool-use, AskUserQuestion, etc.)
#   2. @claude_status=waiting -> amber warning glyph; RESERVED branch,
#                                no current code path writes it. Kept
#                                for future non-permission attention
#                                events that may get wired later.
#   3. @claude_status=<frame> -> orange spinner frame (Claude working)
#   4. @win_glyph set         -> custom glyph; colored on active tab, dim on inactive
#   5. otherwise              -> no prefix
# Active tabs render @win_glyph in @win_glyph_color (the palette pop that
# draws the eye to the focused window). Inactive tabs render @win_glyph in
# the same dim #4B5263,nobold as the title — so the whole inactive tab
# reads as a uniform muted unit, and only the active tab carries palette
# color. The claude_status indicators (asking=bright-yellow, spinner=orange)
# keep their semantic colors regardless of focus — they're attention
# signals, the whole point is to draw the eye to an inactive tab.
setw -g window-status-format "  #[fg=#4B5263#,nobold] #I:#{?#{==:#{@claude_status},asking},#[fg=#F5C300#,bold]  #[fg=#4B5263#,nobold],#{?#{==:#{@claude_status},waiting},#[fg=#E5C07B#,bold]  #[fg=#4B5263#,nobold],#{?#{!=:#{@claude_status},},#[fg=#D97757#,bold] #{@claude_status} #[fg=#4B5263#,nobold],#{?#{!=:#{@win_glyph},}, #{@win_glyph} , }}}}#W  "
setw -g window-status-current-format " #[fg=#{?#{==:#S,vps},##388E3C,##60A5FA}#,bg=default]#[bg=#{?#{==:#S,vps},##388E3C,##60A5FA}#,fg=#031B21#,bold] #I:#{?#{==:#{@claude_status},asking},#[fg=#B91C1C#,bold]  #[fg=#031B21#,bold],#{?#{==:#{@claude_status},waiting},#[fg=#E5C07B#,bold]  #[fg=#031B21#,bold],#{?#{!=:#{@claude_status},},#[fg=#D97757#,bold] #{@claude_status} #[fg=#031B21#,bold],#{?#{!=:#{@win_glyph},}, #[fg=#{@win_glyph_color}#,bold]#{@win_glyph}#[fg=#031B21#,bold] , }}}}#W #[fg=#{?#{==:#S,vps},##388E3C,##60A5FA}#,bg=default] "
setw -g window-status-activity-style "fg=#E5C07B"

# Pane borders — same color, nearly invisible
set -g pane-border-style "fg=#21252B"
set -g pane-active-border-style "fg=#21252B"

# Dim inactive panes (active pane stays full brightness)
set -g window-style "fg=#4B5263,bg=default"
set -g window-active-style "fg=#ABB2BF,bg=default"

# Message/command bar
set -g message-style "bg=#7DACD3,fg=#031B21,bold"
