# Start windows numbering at 1
set -g base-index 1

# Make pane numbering consistent with windows
setw -g pane-base-index 1

# Rename window to reflect current program
setw -g automatic-rename on

# Renumber windows when a window is closed
set -g renumber-windows on

# Set terminal title
set -g set-titles on

# Slightly longer pane indicators display time
set -g display-panes-time 800

# Slightly longer status messages display time
set -g display-time 1000

# Redraw status line every 10 seconds
set -g status-interval 1

# Clear both screen and history
bind -n C-l send-keys C-l

# Activity
set -g monitor-activity on
set -g visual-activity off

# ── Status bar (One Dark theme, matched to iTerm2) ─────────────
set -g status-style "bg=#031B21,fg=#ABB2BF"

# Mode-aware status left:
#   Normal  → subtle session name
#   Prefix  → blue highlight
#   Copy    → yellow highlight
#   Sync    → red highlight
set -g status-left "\
#{?client_prefix,#[bg=#7DACD3#,fg=#031B21#,bold] PREFIX ,\
#{?pane_in_mode,#[bg=#E5C07B#,fg=#031B21#,bold] COPY ,\
#{?pane_synchronized,#[bg=#C98389#,fg=#031B21#,bold] SYNC ,\
#[bg=#21252B#,fg=#ABB2BF#,bold] #S }}}\
#[bg=default] "

# Continuum's save script is inlined here instead of relying on TPM to inject
# it — TPM prepends to status-right, but config reloads overwrite that, silently
# killing auto-saves. Produces no visible output; just triggers a save check.
set -g status-right "\
#($XDG_CONFIG_HOME/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)\
#[fg=#4B5263]│ #[fg=#ABB2BF]%H:%M \
#[fg=#4B5263]│ #[fg=#ABB2BF]%b %d "

set -g status-left-length 40
set -g status-right-length 40

# Window tabs
# Window tab rendering priority (left glyph → title text):
#   1. @claude_status=waiting -> yellow warning glyph (highest priority)
#   2. @claude_status=<frame> -> orange spinner frame (Claude working)
#   3. @win_glyph set         -> custom glyph in @win_glyph_color
#   4. otherwise              -> no prefix
# Title text always uses default colors (#4B5263 inactive, #7DACD3 active)
# so inactive tabs naturally dim. Only the glyph carries palette color.
# Custom glyph + color are set by the tmux-window-namer Claude skill.
setw -g window-status-format " #[fg=#4B5263#,nobold]#I:#{?#{==:#{@claude_status},waiting},#[fg=#E5C07B#,bold]  #[fg=#4B5263#,nobold],#{?#{!=:#{@claude_status},},#[fg=#D97757#,bold] #{@claude_status} #[fg=#4B5263#,nobold],#{?#{!=:#{@win_glyph},},#[fg=#{?#{!=:#{@win_glyph_color},},#{@win_glyph_color},#4B5263}#,bold] #{@win_glyph} #[fg=#4B5263#,nobold], }}}#W "
setw -g window-status-current-format " #[fg=#7DACD3#,bold]#I:#{?#{==:#{@claude_status},waiting},#[fg=#E5C07B#,bold]  #[fg=#7DACD3#,bold],#{?#{!=:#{@claude_status},},#[fg=#D97757#,bold] #{@claude_status} #[fg=#7DACD3#,bold],#{?#{!=:#{@win_glyph},},#[fg=#{?#{!=:#{@win_glyph_color},},#{@win_glyph_color},#7DACD3}#,bold] #{@win_glyph} #[fg=#7DACD3#,bold], }}}#W "
setw -g window-status-activity-style "fg=#E5C07B"

# Pane borders — same color, nearly invisible
set -g pane-border-style "fg=#21252B"
set -g pane-active-border-style "fg=#21252B"

# Dim inactive panes (active pane stays full brightness)
set -g window-style "fg=#4B5263,bg=default"
set -g window-active-style "fg=#ABB2BF,bg=default"

# Message/command bar
set -g message-style "bg=#7DACD3,fg=#031B21,bold"
