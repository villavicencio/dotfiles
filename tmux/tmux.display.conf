# Start windows numbering at 1
set -g base-index 1

# Make pane numbering consistent with windows
setw -g pane-base-index 1

# Rename window to reflect current program
setw -g automatic-rename on

# Renumber windows when a window is closed
set -g renumber-windows on

# Set terminal title
set -g set-titles on

# Slightly longer pane indicators display time
set -g display-panes-time 800

# Slightly longer status messages display time
set -g display-time 1000

# Redraw status line every 10 seconds
set -g status-interval 1

# Clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# Activity
set -g monitor-activity on
set -g visual-activity off

# ── Status bar with mode-aware colors ──────────────────────────
# Default: dark background
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Mode-aware status bar color:
#   Normal  → dark (bg=#1e1e2e)
#   Prefix  → blue (bg=#89b4fa)
#   Copy    → yellow (bg=#f9e2af)
#   Sync    → red (bg=#f38ba8)
set -g status-left "\
#{?client_prefix,#[bg=#89b4fa#,fg=#1e1e2e#,bold] PREFIX ,\
#{?pane_in_mode,#[bg=#f9e2af#,fg=#1e1e2e#,bold] COPY ,\
#{?pane_synchronized,#[bg=#f38ba8#,fg=#1e1e2e#,bold] SYNC ,\
#[bg=#585b70#,fg=#cdd6f4#,bold] #S }}}\
#[bg=default] "

set -g status-right "\
#[fg=#585b70]│ #[fg=#cdd6f4]%H:%M \
#[fg=#585b70]│ #[fg=#cdd6f4]%b %d "

set -g status-left-length 40
set -g status-right-length 40

# Window tabs
setw -g window-status-format " #[fg=#6c7086]#I:#W "
setw -g window-status-current-format " #[fg=#89b4fa,bold]#I:#W "
setw -g window-status-activity-style "fg=#f9e2af"

# Pane borders
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"

# Message/command bar
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"
